[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 5173
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Secrets scanning configuration
[build.environment]
  # Omit documentation files and example files from secrets scanning
  SECRETS_SCAN_OMIT_PATHS = "*.md,.env.example,scripts/**/*.sql,trendipay-test.html,dist/**/*.js"
  # Vite prefixed variables are meant to be exposed in client-side code
  # These are intentionally public as they're used for client-side payment processing
  SECRETS_SCAN_OMIT_KEYS = "VITE_TRENDIPAY_API_URL,VITE_TRENDIPAY_WEBHOOK_SECRET,VITE_TRENDIPAY_MERCHANT_ID,VITE_TRENDIPAY_TERMINAL_ID,VITE_TRENDIPAY_API_KEY,VITE_DEV_USER_ID,google_maps_api_key,VITE_GOOGLE_MAPS_API_KEY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), geolocation=(self), microphone=(self), payment=(self), vibrate=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: blob: https: http:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://nominatim.openstreetmap.org https://test-api.bsl.com.gh https://prod-api.bsl.com.gh https://unpkg.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; worker-src 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

# Digital Asset Links for TWA (Trusted Web Activity)
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

# Serve .well-known files directly (must come BEFORE the catch-all)
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
